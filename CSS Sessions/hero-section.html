<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My awesome website</title>
<style>

  /* ---------- 1. RESET ---------- */
  /* Browsers ship with different default margins/padding on
     body, h1, p, etc. We zero everything out so OUR css is the
     only thing controlling spacing. */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
  }
  .hero {
    position: relative;     
    min-height: 100vh;       
    display: flex;           
    align-items: center;     
    justify-content: center; 
    text-align: center;

  
    background: url('city skyline.jpg') center / cover no-repeat;
  }

  
  .hero::before {
    content: "";             
    position: absolute;      
    inset: 0;                 
    background: rgba(0, 0, 0, 0.45); 
  }

  
  .hero__content {
    position: relative; 
    z-index: 1;
    color: #ffffff;
    padding: 0 24px;          
    max-width: 900px;
  }

  .hero__title {
    font-size: clamp(2rem, 6vw, 4.25rem); 
    line-height: 1.1;
    margin-bottom: 1.25rem;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.35); 
  }
  .hero__subtitle {
    font-size: clamp(1rem, 2.2vw, 1.25rem);
    font-weight: 600;
    margin-bottom: 2.25rem;
    opacity: 0.95;
  }


  .hero__button {
    display: inline-block;
    font-size: 1.05rem;
    font-weight: 600;
    color: #ffffff;
    padding: 0.9rem 2.6rem;
    border: 2px solid rgba(255, 255, 255, 0.85); 
    border-radius: 999px;     
    background: linear-gradient(135deg, #9b6fd6, #7c4fc9);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .hero__button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(124, 79, 201, 0.45);
  }

  .hero__button:focus-visible {
    outline: 3px solid #fff;
    outline-offset: 3px;
  }

</style>
</head>
<body>

  <section class="hero">
    <div class="hero__content">
      <h1 class="hero__title">My awesome website</h1>
      <p class="hero__subtitle">Look at this website and bask in its amazing glory!</p>
      <button class="hero__button">Go ahead...</button>
    </div>
  </section>

</body>
</html>
