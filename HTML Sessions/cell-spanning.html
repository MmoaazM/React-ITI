<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Table</title>
<style>
  body {
    font-family: "Times New Roman", Times, serif;
    text-align: center;
  }
  h1 { margin-bottom: 25px; }
  table {
    border-collapse: collapse;
    margin: 0 auto;
    width: 85%;
  }
  td {
    border: 3px double #333;
    padding: 35px 15px;
    text-align: center;
  }
</style>
</head>
<body>

<h1>HTML Table</h1>

<table>
  <tr>
    <td colspan="2">Cell 1</td>
    <td>Cell 2</td>
    <td>Cell 3</td>
  </tr>
  <tr>
    <td rowspan="3">Cell 4</td>
    <td>Cell 5</td>
    <td>Cell 6</td>
    <td>Cell 7</td>
  </tr>
  <tr>
    <td colspan="3">Cell 8</td>
  </tr>
  <tr>
    <td>Cell 9</td>
    <td colspan="2">Cell 10</td>
  </tr>
</table>

</body>
</html>
