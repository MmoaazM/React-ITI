<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seminar Schedule</title>
<style>
  body { font-family: Georgia, "Times New Roman", serif; }
  table {
    border-collapse: collapse;
    width: 520px;
    text-align: center;
  }
  td, th {
    border: 1px solid #444;
    padding: 8px 10px;
  }
  th { font-weight: normal; }
  .yellow { background-color: #ffffcc; }
  .purple { background-color: #ccccff; }
  .green  { background-color: #ccffcc; }
</style>
</head>
<body>

<table>
  <tr>
    <th colspan="4">Seminar</th>
  </tr>
  <tr>
    <th rowspan="2">Day</th>
    <th colspan="2">Schedule</th>
    <th rowspan="2">Topic</th>
  </tr>
  <tr>
    <th>Begin</th>
    <th>End</th>
  </tr>

  <tr>
    <td rowspan="2">Monday</td>
    <td rowspan="2" class="yellow">8:00 a.m.</td>
    <td rowspan="2" class="purple">5:00 p.m.</td>
    <td>Introduction to XML</td>
  </tr>
  <tr>
    <td>Validity: DTD and Relax NG</td>
  </tr>

  <tr>
    <td rowspan="3">Tuesday</td>
    <td class="yellow">8:00 a.m.</td>
    <td>11:00 a.m.</td>
    <td rowspan="2">XPath</td>
  </tr>
  <tr>
    <td>11:00 a.m.</td>
    <td class="green">2:00 p.m.</td>
  </tr>
  <tr>
    <td class="green">2:00 p.m.</td>
    <td>5:00 p.m.</td>
    <td>XSL Transformations</td>
  </tr>

  <tr>
    <td>Wednesday</td>
    <td class="yellow">8:00 a.m.</td>
    <td>12:00 p.m.</td>
    <td>XSL Formatting Objects</td>
  </tr>
</table>

</body>
</html>
